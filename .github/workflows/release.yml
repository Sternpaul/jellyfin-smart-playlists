name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger the workflow on version tags (e.g., v1.0.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build Plugin
      run: dotnet build Jellyfin.Plugin.AIRecommender.csproj --configuration Release

    - name: Package Plugin
      run: |
        cd bin/Release/net9.0/
        zip -r Jellyfin.Plugin.AIRecommender.zip Jellyfin.Plugin.AIRecommender.dll

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/net9.0/Jellyfin.Plugin.AIRecommender.zip
        generate_release_notes: true
